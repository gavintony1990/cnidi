server:
  port: ${AUTH_SERVICE_PORT:8081}

spring:
  application:
    name: cnidi-auth-service
  datasource:
    url: ${CNIDI_AUTH_DB_URL:jdbc:mysql://127.0.0.1:3306/cnidi_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${CNIDI_AUTH_DB_USERNAME:root}
    password: ${CNIDI_AUTH_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

dubbo:
  application:
    name: cnidi-auth-service
  protocol:
    name: tri
    port: ${DUBBO_AUTH_PORT:50051}
  registry:
    address: nacos://${NACOS_SERVER_ADDR:127.0.0.1:8848}

cnidi:
  security:
    jwt:
      secret: ${CNIDI_JWT_SECRET:cnidi-jwt-secret-key-change-before-production-1234567890}
      access-token-expire-minutes: ${CNIDI_JWT_ACCESS_TOKEN_EXPIRE_MINUTES:30}
      refresh-token-expire-days: ${CNIDI_JWT_REFRESH_TOKEN_EXPIRE_DAYS:7}
