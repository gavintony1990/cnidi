server:
  port: 8080

spring:
  application:
    name: cnidi-service
  datasource:
    url: jdbc:mysql://localhost:3306/cnidi?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

cnidi:
  jwt:
    # 生产环境通过环境变量 CNIDI_JWT_SECRET 注入，长度至少 32 位
    secret: ${CNIDI_JWT_SECRET:cnidi-dev-secret-key-at-least-32chars}
    expiration-seconds: 86400
